<div class="ai-row">
  <div class="ai-input-wrap">
    <input
      class="ai-input"
      type="text"
      placeholder="e.g. JFK to London next Friday, 2 passengers, business"
      [(ngModel)]="aiText"
      [ngModelOptions]="{standalone: true}"
      (keydown.enter)="autofill()"
      [disabled]="isParsing()"
      aria-label="Describe your trip in natural language"
    />
    <button
      type="button"
      class="btn-autofill"
      (click)="autofill()"
      [disabled]="!aiText.trim() || isParsing()"
    >
      {{ isParsing() ? 'Parsing…' : 'Auto-fill' }}
    </button>
  </div>
  @if (parseFilled()) {
    <span class="ai-hint ai-hint--ok">Form filled — review and adjust if needed.</span>
  }
  @if (parseError()) {
    <span class="ai-hint ai-hint--err">{{ parseError() }}</span>
  }
</div>

<form [formGroup]="form" (ngSubmit)="search()" class="search-form">
  <div class="form-fields">
    <div class="field" [class.field--filled]="filledFields().has('origin')">
      <label for="origin">From</label>
      <select id="origin" formControlName="origin">
        <option value="">Select origin</option>
        @for (a of airports; track a.code) {
          <option [value]="a.code">{{ a.code }} — {{ a.city }}</option>
        }
      </select>
    </div>

    <div class="field" [class.field--filled]="filledFields().has('destination')">
      <label for="destination">To</label>
      <select id="destination" formControlName="destination">
        <option value="">Select destination</option>
        @for (a of airports; track a.code) {
          <option [value]="a.code">{{ a.code }} — {{ a.city }}</option>
        }
      </select>
    </div>

    <div class="field" [class.field--filled]="filledFields().has('departureDate')">
      <label for="date">Date</label>
      <input id="date" type="date" formControlName="departureDate" />
    </div>

    <div class="field field--sm" [class.field--filled]="filledFields().has('passengers')">
      <label for="passengers">Passengers</label>
      <input id="passengers" type="number" formControlName="passengers" min="1" max="9" />
    </div>

    <div class="field field--sm" [class.field--filled]="filledFields().has('cabin')">
      <label for="cabin">Cabin</label>
      <select id="cabin" formControlName="cabin">
        <option value="Economy">Economy</option>
        <option value="Business">Business</option>
        <option value="First">First</option>
      </select>
    </div>
  </div>

  <button type="submit" class="btn-search" [disabled]="form.invalid || state.isLoading()">
    {{ state.isLoading() ? 'Searching…' : 'Search Flights' }}
  </button>
</form>
